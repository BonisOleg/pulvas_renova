<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0ABAB5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>{% block title %}{{ page_title|default:"PulvasStore — Люксові аксесуари та взуття" }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ page_description|default:"Купити брендові сумки, взуття, одяг та аксесуари з доставкою по Україні" }}{% endblock %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  {% load static %}
  <link rel="stylesheet" href="{% static 'shop/css/vars.css' %}">
  <link rel="stylesheet" href="{% static 'shop/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'shop/css/landing.css' %}">
  <link rel="stylesheet" href="{% static 'shop/css/form.css' %}">
  <link rel="stylesheet" href="{% static 'shop/css/parallax.css' %}">

  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  <script src="{% static 'shop/js/main.js' %}" defer></script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>
